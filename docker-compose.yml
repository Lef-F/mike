name: mike

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      AUTHENTICATOR_PASSWORD: ${AUTHENTICATOR_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init.sh:/docker-entrypoint-initdb.d/00-init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  gotrue:
    image: supabase/gotrue:v2.166.0
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: http://${MIKE_HOST}:${MIKE_PORT}/auth/v1
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable&search_path=auth
      GOTRUE_SITE_URL: http://${MIKE_HOST}:${MIKE_PORT}
      GOTRUE_URI_ALLOW_LIST: http://${MIKE_HOST}:${MIKE_PORT}
      GOTRUE_DISABLE_SIGNUP: ${GOTRUE_DISABLE_SIGNUP}
      GOTRUE_MAILER_AUTOCONFIRM: ${GOTRUE_MAILER_AUTOCONFIRM}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM_ENABLED: "true"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9999/health"]
      interval: 5s
      timeout: 5s
      retries: 20

  postgrest:
    image: postgrest/postgrest:v12.2.3
    restart: unless-stopped
    depends_on:
      init-db:
        condition: service_completed_successfully
    environment:
      PGRST_DB_URI: postgres://authenticator:${AUTHENTICATOR_PASSWORD}@postgres:5432/${POSTGRES_DB}
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_JWT_AUD: authenticated
      PGRST_SERVER_PORT: 3000

  garage:
    image: dxflrs/garage:v2.3.0
    restart: unless-stopped
    environment:
      GARAGE_RPC_SECRET: ${GARAGE_RPC_SECRET}
      GARAGE_ADMIN_TOKEN: ${GARAGE_ADMIN_TOKEN}
    networks:
      default:
        # Virtual-hosted-style alias so the AWS S3 SDK's default URL
        # construction "<bucket>.<endpoint>" resolves. Tied to
        # R2_BUCKET_NAME — change this if you rename the bucket.
        aliases:
          - mike.garage
    volumes:
      - ./docker/garage.toml:/etc/garage.toml:ro
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data
    healthcheck:
      test: ["CMD", "/garage", "status"]
      interval: 5s
      timeout: 5s
      retries: 20

  init-db:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
      gotrue:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
    volumes:
      - ./docker/init-db.sh:/init-db.sh:ro
      - ./backend/migrations:/migrations:ro
    entrypoint: ["/bin/sh", "/init-db.sh"]
    restart: "no"

  init-garage:
    image: alpine:3.20
    depends_on:
      garage:
        condition: service_healthy
    environment:
      GARAGE_ADMIN_TOKEN: ${GARAGE_ADMIN_TOKEN}
      GARAGE_RPC_HOST: garage:3901
    volumes:
      - ./docker/init-garage.sh:/init-garage.sh:ro
      - garage_creds:/secrets
    entrypoint: ["/bin/sh", "/init-garage.sh"]
    restart: "no"

  mike-backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    image: mike-backend:local
    restart: unless-stopped
    depends_on:
      init-db:
        condition: service_completed_successfully
      init-garage:
        condition: service_completed_successfully
      gotrue:
        condition: service_healthy
    environment:
      PORT: 3001
      FRONTEND_URL: http://${MIKE_HOST}:${MIKE_PORT}
      SUPABASE_URL: http://caddy:${MIKE_PORT}
      SUPABASE_SECRET_KEY: ${SUPABASE_SECRET_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      DOWNLOAD_SIGNING_SECRET: ${DOWNLOAD_SIGNING_SECRET}
      USER_API_KEYS_ENCRYPTION_KEY: ${USER_API_KEYS_ENCRYPTION_KEY}
      BACKEND_PUBLIC_URL: ${BACKEND_PUBLIC_URL:-http://${MIKE_HOST}:${MIKE_PORT}/backend}
      MCP_ALLOW_PRIVATE_HOSTS: ${MCP_ALLOW_PRIVATE_HOSTS:-true}
      R2_ENDPOINT_URL: http://garage:3900
      R2_BUCKET_NAME: ${R2_BUCKET_NAME}
    volumes:
      - garage_creds:/run/secrets:ro

  mike-frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: http://${MIKE_HOST}:${MIKE_PORT}
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${SUPABASE_PUBLISHABLE_KEY}
        NEXT_PUBLIC_API_BASE_URL: http://${MIKE_HOST}:${MIKE_PORT}/backend
    image: mike-frontend:local
    restart: unless-stopped
    depends_on:
      mike-backend:
        condition: service_started

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - gotrue
      - postgrest
      - mike-backend
      - mike-frontend
    environment:
      # Caddy listens on :{$MIKE_PORT} (any host) so MIKE_HOST is not
      # consumed here — it only flows into the frontend's baked URLs
      # and GoTrue's allow-list.
      MIKE_PORT: ${MIKE_PORT}
    ports:
      - "${MIKE_PORT}:${MIKE_PORT}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  garage_meta:
  garage_data:
  garage_creds:
  caddy_data:
  caddy_config:
