metadata_dir = "/var/lib/garage/meta"
data_dir     = "/var/lib/garage/data"
db_engine    = "lmdb"

replication_factor = 1

rpc_bind_addr   = "[::]:3901"
rpc_public_addr = "garage:3901"
# rpc_secret is supplied via the GARAGE_RPC_SECRET environment variable.

[s3_api]
api_bind_addr = "[::]:3900"
# Region must match the value the AWS SDK signs requests with.
# Mike's backend hardcodes `region: "auto"` in src/lib/storage.ts.
s3_region     = "auto"
# Suffix the AWS SDK appends to bucket names when constructing
# virtual-hosted-style URLs ("<bucket>.<endpoint-host>"). Must match
# the docker-compose network alias (e.g. "mike.garage" for bucket
# "mike" routed via the "garage" service).
root_domain   = ".garage"

[admin]
api_bind_addr = "[::]:3903"
# admin_token / metrics_token come from GARAGE_ADMIN_TOKEN.
